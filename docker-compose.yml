version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn sentinelops.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      SENTINELOPS_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run alembic upgrade head
    env_file:
      - .env
    profiles:
      - tools
